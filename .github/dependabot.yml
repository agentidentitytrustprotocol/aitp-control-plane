# Keep npm dependencies and GitHub Actions current.
# Grouped weekly PRs so dependency noise stays reviewable.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # The aitp SDK (real name + npm: alias) is normally adopted the moment
      # aitp-rs publishes, via the event-driven bump-aitp workflow. This group
      # is the backstop: if a dispatch is ever missed, Dependabot opens the same
      # bump PR on its weekly run.
      aitp-sdk:
        patterns:
          - aitp
          - '@agentidentitytrustprotocol/aitp'
      # Routine minor/patch bumps arrive as one PR; majors stay separate.
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - aitp
          - '@agentidentitytrustprotocol/aitp'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
