# Keep npm dependencies and GitHub Actions current.
# Grouped weekly PRs so dependency noise stays reviewable.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # Routine minor/patch bumps arrive as one PR; majors stay separate.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # The aitp SDK is adopted deliberately, version-by-version
      # (see e.g. the 0.4.0 adoption PR) — don't auto-bump it.
      - dependency-name: aitp

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
